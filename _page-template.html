    /* ── Base reset & theme tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --ink: #e5e7eb;
      --muted: #a3afbf;
      --accent: #3b82f6;
      --line: #1f2937;
      --card: rgba(15,23,42,0.6);

    :root.light {

      --muted: #64748b;
      --accent: #2563eb;
      --line: #e2e8f0;
      --card: rgba(255,255,255,0.9);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
    }

    .wrap { max-width: 860px; margin: 0 auto; padding: 0 20px; }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--muted);
      font-size: .8rem;
      font-family: inherit;
      z-index: 100;
      transition: color .15s, border-color .15s;
    }
    .theme-toggle:hover { color: var(--ink); border-color: var(--ink); }
    .theme-toggle svg { width: 16px; height: 16px; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
      margin: 32px 0 24px;
      transition: color .15s;
    }
    .back-link:hover { color: var(--ink); }
    .back-link svg { width: 18px; height: 18px; }

    /* ── Logo ── */
    .logo-hero { text-align: center; margin-bottom: 32px; }
    .logo-img { height: 60px; width: auto; }

    /* ── Page header ── */
    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 { font-family: 'Merriweather', serif; font-size: 2rem; margin-bottom: 12px; }
    .page-header .sub { color: var(--muted); font-size: 1.05rem; }

    /* ── Main content card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 32px;
    }

    /* ── Site Footer ── */
    .site-footer {
      padding: 40px 0;
      border-top: 1px solid var(--line);
      text-align: center;
    }
    .footer-social { margin-bottom: 24px; }
    .social-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .social-row:last-child { margin-bottom: 0; }
    .row-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
      padding-right: 8px;
      border-right: 1px solid var(--line);
    }
    .social-row a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--line);
      transition: all .15s;
    }
    .social-row a:hover { color: var(--ink); border-color: var(--ink); transform: translateY(-2px); }
    .social-row svg { width: 18px; height: 18px; }
    @media (max-width: 480px) {

  <script>
    // Theme toggle — reads/writes data-theme on <html>
    (function(){
      var root = document.documentElement;
      var saved = localStorage.getItem('theios.theme');
      if(saved) { root.classList.add(saved); root.setAttribute('data-theme', saved); }
    })();

    var btn = document.getElementById('themeToggle');
    var label = document.getElementById('themeLabel');

    function setTheme(mode) {
      var root = document.documentElement;
      root.classList.remove('light','auto','dark');
      root.classList.add(mode);
      root.setAttribute('data-theme', mode);
      localStorage.setItem('theios.theme', mode);
      label.textContent = mode[0].toUpperCase() + mode.slice(1);
    }

    (function(){
      var cur = document.documentElement.getAttribute('data-theme') || 'auto';
      label.textContent = cur[0].toUpperCase() + cur.slice(1);
    })();

    btn.addEventListener('click', function(){
      var cur = document.documentElement.getAttribute('data-theme') || 'auto';
      setTheme(cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto');
    });

    // ADD PAGE-SPECIFIC SCRIPTS BELOW THIS LINE
  </script>
